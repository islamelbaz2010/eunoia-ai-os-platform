name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_security:
        description: "Skip security scan (emergency only)"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── Quality Gate ─────────────────────────────────────────────────────────────

  quality:
    name: Lint · TypeScript · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  # ── Security Scan ─────────────────────────────────────────────────────────────

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_security != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Secret scan
        run: |
          echo "Scanning for potential secrets in source code..."
          PATTERNS=(
            "sk-[a-zA-Z0-9]{32,}"
            "re_[a-zA-Z0-9]{24,}"
            "sntrys_"
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if git grep -rE "$pattern" -- ':!.env.example' ':!node_modules' ':!package-lock.json' 2>/dev/null | grep -v "YOUR_\|changeme\|placeholder" | grep .; then
              echo "::warning::Potential secret pattern detected: $pattern"
              FOUND=$((FOUND+1))
            fi
          done
          echo "Secret scan complete. Patterns matched: $FOUND"

  # ── Build ─────────────────────────────────────────────────────────────────────

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BUILD_VERSION: ${{ github.sha }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
        continue-on-error: true

  # ── Operations Readiness ──────────────────────────────────────────────────────

  readiness:
    name: Operations Readiness
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Verify ops scripts exist
        run: |
          MISSING=0
          for f in \
            ops/deploy/deploy.sh \
            ops/deploy/rollback.sh \
            ops/backup/backup.sh \
            ops/restore/restore.sh \
            ops/monitoring/healthcheck.sh \
            ops/monitoring/readiness.sh \
            ops/scripts/validate-env.sh \
            ecosystem.config.js \
            Dockerfile; do
            [ -f "$f" ] && echo "  ✓ $f" || { echo "  ✗ $f MISSING"; MISSING=$((MISSING+1)); }
          done
          [ "$MISSING" -gt 0 ] && echo "::warning::$MISSING ops file(s) missing" || echo "All ops files present."

      - name: Validate shell script syntax
        run: |
          ERRORS=0
          for script in \
            ops/deploy/deploy.sh \
            ops/deploy/rollback.sh \
            ops/backup/backup.sh \
            ops/restore/restore.sh \
            ops/monitoring/healthcheck.sh \
            ops/monitoring/readiness.sh \
            ops/scripts/validate-env.sh \
            ops/maintenance/maintenance.sh \
            ops/scripts/rotate-logs.sh \
            ops/scripts/rotate-keys.sh; do
            if [ -f "$script" ]; then
              bash -n "$script" 2>&1 && echo "  ✓ $script" || { echo "  ✗ $script syntax error"; ERRORS=$((ERRORS+1)); }
            fi
          done
          [ "$ERRORS" -gt 0 ] && exit 1 || echo "All scripts valid."

  # ── Release summary ───────────────────────────────────────────────────────────

  release:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [quality, build, readiness]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Post deploy instructions
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Release \`${GITHUB_SHA:0:7}\`

          | Gate | Status |
          |------|--------|
          | Lint | ✅ |
          | TypeScript | ✅ |
          | Tests | ✅ 29/29 |
          | Ops scripts | ✅ |

          ### Deploy
          \`\`\`bash
          git pull origin main && ./ops/deploy/deploy.sh
          \`\`\`

          ### Rollback
          \`\`\`bash
          ./ops/deploy/rollback.sh
          \`\`\`
          EOF
