# ops/docs/nginx.conf — Production Nginx configuration for Eunoia AI OS
#
# Deploy:
#   sudo cp ops/docs/nginx.conf /etc/nginx/sites-available/eunoia
#   sudo ln -s /etc/nginx/sites-available/eunoia /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
#
# Prerequisites:
#   - Nginx 1.18+
#   - SSL certificates from Let's Encrypt (see ops/docs/ssl.md)
#   - Next.js app running on localhost:3000 (PM2 or Docker)
#   - Replace "yourdomain.com" with your actual domain

# ── Rate limiting zones ───────────────────────────────────────────────────────

# General rate limit: 30 requests/minute per IP
limit_req_zone  $binary_remote_addr zone=general:10m  rate=30r/m;

# API rate limit: 60 requests/minute per IP (more generous for API clients)
limit_req_zone  $binary_remote_addr zone=api:10m      rate=60r/m;

# Auth rate limit: 10 requests/minute per IP (brute-force protection)
limit_req_zone  $binary_remote_addr zone=auth:10m     rate=10r/m;

# ── Upstream ──────────────────────────────────────────────────────────────────

upstream eunoia_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server ───────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL ──────────────────────────────────────────────────────────────────

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # Mozilla Intermediate SSL config (https://ssl-config.mozilla.org/)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ──────────────────────────────────────────────────────
    # Note: CSP and most headers are set by Next.js next.config.ts.
    # Only add headers here that Next.js cannot set (e.g. HSTS, which needs
    # to be at the TLS layer).

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Compression ───────────────────────────────────────────────────────────

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/html
        text/plain
        text/xml;

    # ── Buffer tuning ─────────────────────────────────────────────────────────

    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    client_max_body_size       10M;   # max upload size (documents)

    # ── Static file caching ───────────────────────────────────────────────────

    # Next.js hashed static assets — safe to cache forever
    location /_next/static/ {
        proxy_pass http://eunoia_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # Public folder assets
    location /public/ {
        root /path/to/eunoia-ai-os-platform;  # replace with actual path
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Rate limiting — auth routes ───────────────────────────────────────────

    location ~ ^/(login|signup|auth/) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://eunoia_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Rate limiting — API routes ────────────────────────────────────────────

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://eunoia_app;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;  # RAG queries can take 5-10s
    }

    # ── Main application ──────────────────────────────────────────────────────

    location / {
        limit_req zone=general burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://eunoia_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Pass through Next.js's own cache-control headers
        proxy_pass_header  Cache-Control;
    }

    # ── Health check — no rate limit, no auth ─────────────────────────────────

    location /api/live {
        proxy_pass         http://eunoia_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;  # suppress noise in access logs
    }

    # ── Deny dot files and hidden paths ──────────────────────────────────────

    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Error pages ───────────────────────────────────────────────────────────

    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":"Too Many Requests","retry_after":60}';
        add_header Content-Type application/json always;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service Temporarily Unavailable"}';
        add_header Content-Type application/json always;
    }

    # ── Logging ───────────────────────────────────────────────────────────────

    access_log  /var/log/nginx/eunoia-access.log combined buffer=32k flush=5s;
    error_log   /var/log/nginx/eunoia-error.log  warn;
}
