# docker-compose.production.yml — Production deployment
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml down
#   docker compose -f docker-compose.production.yml logs -f app
#
# Prerequisites:
#   - .env.local with all required variables (see .env.example)
#   - docker and docker compose v2 installed
#   - Port 3000 available (or change APP_PORT)
#
# Environment variables:
#   All app secrets come from .env.local (passed via env_file).
#   BUILD_VERSION should be set at build time: git rev-parse --short HEAD

version: "3.8"

services:
  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        BUILD_VERSION: "${BUILD_VERSION:-unknown}"

    image: eunoia-ai-os:${BUILD_VERSION:-latest}
    container_name: eunoia-app

    restart: unless-stopped

    ports:
      - "${APP_PORT:-3000}:3000"

    env_file:
      - .env.local

    environment:
      NODE_ENV: production
      PORT: 3000
      BUILD_VERSION: "${BUILD_VERSION:-unknown}"

    # Health check: maps to K8s livenessProbe
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource limits (adjust based on your server tier)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

    volumes:
      - app-logs:/app/.next/server/logs

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    networks:
      - eunoia-net

  # ── Prometheus ───────────────────────────────────────────────────────────────
  # Uncomment to run Prometheus alongside the app for local metrics collection.
  #
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: eunoia-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./ops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   command:
  #     - "--config.file=/etc/prometheus/prometheus.yml"
  #     - "--storage.tsdb.retention.time=30d"
  #     - "--web.enable-lifecycle"
  #   networks:
  #     - eunoia-net

  # ── Grafana ───────────────────────────────────────────────────────────────────
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: eunoia-grafana
  #   restart: unless-stopped
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-changeme}"
  #     GF_USERS_ALLOW_SIGN_UP: "false"
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #     - ./docs/operations/grafana:/etc/grafana/provisioning/dashboards:ro
  #   networks:
  #     - eunoia-net

networks:
  eunoia-net:
    driver: bridge

volumes:
  app-logs:
  # prometheus-data:
  # grafana-data:
